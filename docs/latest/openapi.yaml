openapi: 3.1.0
info:
  title: Theorem Governance Node API
  version: 0.3.0
  description: |
    HTTP API for a Theorem governance kernel instance. Any program that can
    make HTTP requests can interact with this API — no SDK required.

    The kernel enforces all governance rules (E1-E16). This OpenAPI file
    documents the stable public subset of the theorem-node HTTP surface.

    The running node also exposes additional operator/admin and Ring 3 adapter
    routes that are intentionally excluded from this file:
    `GET /export-state`, `GET /rebuild-authority-state`,
    `POST /restore-authority-state`, `POST /retire-entity`,
    `POST /commit-intent-hash`, `POST /refresh-commitment-token`,
    `POST /register-measurement-method`, `POST /witness/commit-intent`,
    `POST /witness/commit-outcome`, and
    `POST /witness/publish-drift-attestation`.

    Witness replication routes (`/witness/publish`, `/witness/entries`,
    `/witness/digest`) are part of the witness subsystem and not part of the
    authority contract.
  license:
    name: MIT

servers:
  - url: http://localhost:3170
    description: Local instance

paths:
  /health:
    get:
      summary: Process liveness
      operationId: getHealth
      description: |
        Lightweight liveness probe for orchestration and host monitoring.
        Returns HTTP 200 whenever the server process is healthy enough to
        answer requests. Use `/status` for richer readiness and governance
        state inspection.
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [ok] }
                  healthy: { type: boolean }
                  bootstrapped: { type: boolean }

  /ready:
    get:
      summary: Instance readiness
      operationId: getReady
      description: |
        Readiness probe for orchestration and traffic cutover. Returns HTTP 200
        only when the instance is bootstrapped and the required runtime secrets
        are configured.
      responses:
        "200":
          description: Instance is ready to receive traffic
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [ready] }
                  ready: { type: boolean, enum: [true] }
                  bootstrapped: { type: boolean }
                  witness_token_configured: { type: boolean }
                  commitment_secret_configured: { type: boolean }
        "503":
          description: Instance is not ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [not_ready] }
                  ready: { type: boolean, enum: [false] }
                  bootstrapped: { type: boolean }
                  witness_token_configured: { type: boolean }
                  commitment_secret_configured: { type: boolean }

  /status:
    get:
      summary: Instance status
      operationId: getStatus
      responses:
        "200":
          description: Status summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  bootstrapped: { type: boolean }
                  active_entities: { type: integer }
                  system_entity: { type: boolean }
                  bootstrap_entity: { type: boolean }
                  scopes: { type: integer }
                  proof_obligations: { type: integer }
                  proof_status_counts: { type: object }
                  last_audit: { type: object, nullable: true }

  /audit:
    get:
      summary: Run full audit (C1-C22)
      operationId: runAudit
      responses:
        "200":
          description: Audit results
          content:
            application/json:
              schema:
                type: object
                properties:
                  all_satisfied: { type: boolean }
                  pass_count: { type: integer }
                  total_count: { type: integer }
                  criteria:
                    type: array
                    items:
                      type: object
                      properties:
                        criterion: { type: string }
                        satisfied: { type: boolean }
                        findings: { type: array, items: { type: string } }

  /verify:
    get:
      summary: Run deterministic verifier (25 properties)
      operationId: runVerifier
      responses:
        "200":
          description: Verifier results
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid: { type: boolean }
                  checks:
                    type: array
                    items:
                      type: object
                      properties:
                        property_id: { type: string }
                        status: { type: string, enum: [Pass, Fail, Skip, RequiresPhysicalAudit] }
                        details: { type: array, items: { type: string } }

  /proof-lifecycle:
    get:
      summary: Run proof lifecycle check (expiry, activation, cascade)
      operationId: runProofLifecycle
      description: |
        Checks all proof obligations and applies status transitions:
        - Submitted proofs with matching spec hash → Active
        - Expired proofs → Expired (with escalation)
        - Spec hash mismatches → Invalidated
        - Cascade invalidation from dependent proofs
      responses:
        "200":
          description: Transitions applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  transitions:
                    type: array
                    items:
                      type: object
                      properties:
                        proof_id: { type: string, format: uuid }
                        from_status: { type: string }
                        to_status: { type: string }
                        reason: { type: string }
                  escalation_signals:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        signal_type: { type: string }

  /watchdog:
    get:
      summary: Infrastructure health checks
      operationId: runWatchdog
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  healthy: { type: boolean }
                  issues:
                    type: array
                    items:
                      type: object
                      properties:
                        check: { type: string }
                        target_id: { type: string, format: uuid }
                        issues: { type: array, items: { type: string } }

  /metrics:
    get:
      summary: Prometheus metrics
      operationId: getMetrics
      responses:
        "200":
          description: Prometheus text exposition format
          content:
            text/plain:
              schema:
                type: string

  /governance-events:
    get:
      summary: List canonical authority history
      operationId: listGovernanceEvents
      responses:
        "200":
          description: Governance event feed
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      type: object
                  count:
                    type: integer

  /authorizations:
    get:
      summary: List authorizations for a principal entity
      operationId: listAuthorizations
      parameters:
        - name: entity_id
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Matching authorizations
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string, format: uuid }
                    principal_id: { type: string, format: uuid }
                    scope_id: { type: string, format: uuid }
                    status: { type: string }
                    granted_by_id: { type: string, format: uuid }
                    action_vocabulary:
                      type: array
                      items: { type: string }

  /declare-intent:
    post:
      summary: Declare an intent before execution or governance mutation
      operationId: declareIntent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - entity_id
                - objective
                - success_criteria
                - constraints
                - scope_rationale
                - paths_not_taken
                - beneficiary_intent_snapshots
              properties:
                entity_id: { type: string, format: uuid }
                objective: { type: string, minLength: 1 }
                success_criteria:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    properties:
                      criterion: { type: string }
                      measurable_indicator: { type: string }
                constraints:
                  type: array
                  items: { type: string }
                scope_rationale: { type: string, minLength: 1 }
                paths_not_taken:
                  type: object
                  required: [alternatives, deliberation_summary]
                  properties:
                    alternatives:
                      type: array
                      minItems: 2
                      items:
                        type: object
                        properties:
                          description: { type: string }
                          reason_rejected: { type: string }
                          signal_ids_that_influenced:
                            type: array
                            items: { type: string }
                    deliberation_summary: { type: string }
                beneficiary_intent_snapshots:
                  type: array
                  items:
                    type: object
                    properties:
                      entity_id: { type: string, format: uuid }
                      intent_summary: { type: string }
                bus_intent_hash: { type: string }
                intent_nonce: { type: string }
      responses:
        "200":
          description: Intent stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  intent_id: { type: string, format: uuid }
                  declared_at: { type: string, format: date-time }
                  minimum_wait_ms: { type: integer }
                  earliest_execution_at: { type: string, format: date-time }
                  commitment_mode: { type: string }
                  intent_integrity_violation: { type: boolean }

  /submit-act:
    post:
      summary: Submit an execution act
      operationId: submitAct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [executing_entity_id, authorization_id, scope_id, intent_id, drift_measurements]
              properties:
                executing_entity_id: { type: string, format: uuid }
                authorization_id: { type: string, format: uuid }
                scope_id: { type: string, format: uuid }
                intent_id: { type: string, format: uuid }
                drift_measurements:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    properties:
                      entity_id: { type: string, format: uuid }
                      intent_id: { type: string, format: uuid }
                      distance: { type: number }
                      confidence: { type: number, minimum: 0, maximum: 1 }
                      method_id: { type: string, format: uuid }
                      measured_at: { type: string, format: date-time }
                      active_signals_at_act: { type: array, default: [] }
                resource_consumption_entries:
                  type: array
                  default: []
                outcome_description:
                  type: string
                  description: Optional outcome summary for kernel-side drift verification
      responses:
        "200":
          description: Act accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  act_id: { type: string, format: uuid }
                  acts_produced: { type: integer }
                  attributions: { type: integer }
                  attestations: { type: integer }
                  signals: { type: integer }
                  drift_signals: { type: integer }
                  drift_verification:
                    type: object
                    nullable: true
        "422":
          description: Kernel rejected — enforcement rule violations
          content:
            text/plain:
              schema:
                type: string

  /establish-entity:
    post:
      summary: Create a new governed entity
      operationId: establishEntity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - type
                - scope_id
                - authorized_by
                - intent_id
                - drift_measurements
                - governance_paths_not_taken
              properties:
                name: { type: string }
                type: { type: string, enum: [authorizing, executing, participating, observing] }
                scope_id: { type: string, format: uuid }
                authorized_by: { type: string, format: uuid, description: Entity with governance_act authorization }
                intent_id: { type: string, format: uuid }
                drift_measurements:
                  type: array
                  items: { type: object }
                governance_paths_not_taken:
                  type: object
      responses:
        "200":
          description: Entity established
          content:
            application/json:
              schema:
                type: object
                properties:
                  entity_id: { type: string, format: uuid }
                  authorization_id: { type: string, format: uuid }
                  governance_act_id: { type: string, format: uuid }
                  act_id: { type: string, format: uuid }

  /create-scope:
    post:
      summary: Create a child scope under a parent
      operationId: createScope
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - parent_scope_id
                - domains
                - contexts
                - entity_types_permitted
                - entity_id
                - intent_id
                - drift_measurements
                - governance_paths_not_taken
              properties:
                parent_scope_id: { type: string, format: uuid }
                domains: { type: array, items: { type: string } }
                deployment_domains: { type: array, items: { type: string }, default: [] }
                contexts: { type: array, items: { type: string } }
                entity_types_permitted:
                  type: array
                  items: { type: string, enum: [authorizing, executing, participating, observing] }
                entity_id: { type: string, format: uuid, description: Entity with governance_act authorization }
                intent_id: { type: string, format: uuid }
                drift_measurements:
                  type: array
                  items: { type: object }
                governance_paths_not_taken:
                  type: object
      responses:
        "200":
          description: Scope created
          content:
            application/json:
              schema:
                type: object
                properties:
                  scope_id: { type: string, format: uuid }
                  governance_act_id: { type: string, format: uuid }
                  act_id: { type: string, format: uuid }

  /amend-parameter:
    post:
      summary: Amend a kernel parameter
      operationId: amendParameter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [param, value, entity_id]
              properties:
                param: { type: string }
                value: { type: integer }
                entity_id: { type: string, format: uuid }
      responses:
        "200":
          description: Parameter amended
          content:
            application/json:
              schema:
                type: object
                properties:
                  parameter: { type: string }
                  new_value: { type: integer }
                  entity_id: { type: string, format: uuid }

  /revoke-authorization:
    post:
      summary: Revoke an authorization
      operationId: revokeAuthorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - authorization_id
                - revoking_entity_id
                - intent_id
                - drift_measurements
                - governance_paths_not_taken
              properties:
                authorization_id: { type: string, format: uuid }
                revoking_entity_id: { type: string, format: uuid, description: Must be the granting entity or bootstrap }
                intent_id: { type: string, format: uuid }
                drift_measurements:
                  type: array
                  items: { type: object }
                governance_paths_not_taken:
                  type: object
      responses:
        "200":
          description: Authorization revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  authorization_id: { type: string, format: uuid }
                  principal_entity_id: { type: string, format: uuid }
                  revoked_by: { type: string, format: uuid }
                  governance_act_id: { type: string, format: uuid }

  /submit-proof:
    post:
      summary: Submit or update a proof obligation
      operationId: submitProof
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - property_name
                - proof_content
                - entity_id
                - intent_id
                - drift_measurements
                - governance_paths_not_taken
              properties:
                property_name: { type: string, description: "e.g. PROP-PARAM-001" }
                proof_content: { type: object, description: Proof methodology and evidence }
                entity_id: { type: string, format: uuid }
                intent_id: { type: string, format: uuid }
                drift_measurements:
                  type: array
                  items: { type: object }
                governance_paths_not_taken:
                  type: object
      responses:
        "200":
          description: Proof submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  property_name: { type: string }
                  proof_id: { type: string, format: uuid }
                  previous_status: { type: string }
                  new_status: { type: string }
                  proof_hash: { type: string }
                  governance_act_id: { type: string, format: uuid }
                  act_id: { type: string, format: uuid }

  /admit-artifact:
    post:
      summary: Admit a runtime artifact hash into theorem authority state
      operationId: admitArtifact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, binary_hash, entity_id]
              properties:
                name: { type: string }
                binary_hash: { type: string }
                entity_id: { type: string, format: uuid }
      responses:
        "200":
          description: Artifact admitted or already present
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifact_id: { type: string, format: uuid }
                  binary_hash: { type: string }
                  governance_act_id: { type: string, format: uuid }
                  status: { type: string }

  /revoke-artifact:
    post:
      summary: Revoke a previously admitted runtime artifact hash
      operationId: revokeArtifact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [binary_hash, entity_id]
              properties:
                binary_hash: { type: string }
                entity_id: { type: string, format: uuid }
                reason: { type: string }
      responses:
        "200":
          description: Artifact revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifact_id: { type: string, format: uuid }
                  binary_hash: { type: string }
                  governance_act_id: { type: string, format: uuid }
                  status: { type: string }

  /admit-action:
    post:
      summary: Admit an executable action for a principal entity
      operationId: admitAction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action_name, payload, scope_id, principal_entity_id, entity_id]
              properties:
                action_name: { type: string }
                payload: { type: string }
                scope_id: { type: string, format: uuid }
                principal_entity_id: { type: string, format: uuid }
                entity_id: { type: string, format: uuid }
                ttl_secs: { type: integer, nullable: true }
      responses:
        "200":
          description: Action admitted
          content:
            application/json:
              schema:
                type: object

  /revoke-action-admission:
    post:
      summary: Revoke an admitted action
      operationId: revokeActionAdmission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action_admission_id, entity_id]
              properties:
                action_admission_id: { type: string, format: uuid }
                entity_id: { type: string, format: uuid }
                reason: { type: string }
      responses:
        "200":
          description: Action admission revoked
          content:
            application/json:
              schema:
                type: object

  /record-trust:
    post:
      summary: Record a theorem-native trust relationship
      operationId: recordTrust
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject_entity_id, scope_id, entity_id, trust_kind, rationale]
              properties:
                subject_entity_id: { type: string, format: uuid }
                scope_id: { type: string, format: uuid }
                entity_id: { type: string, format: uuid }
                trust_kind: { type: string }
                rationale: { type: string }
      responses:
        "200":
          description: Trust recorded
          content:
            application/json:
              schema:
                type: object

  /record-fork:
    post:
      summary: Record a theorem-native fork relationship
      operationId: recordFork
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scope_id, forked_from_scope_id, entity_id, reason]
              properties:
                scope_id: { type: string, format: uuid }
                forked_from_scope_id: { type: string, format: uuid }
                entity_id: { type: string, format: uuid }
                reason: { type: string }
      responses:
        "200":
          description: Fork recorded
          content:
            application/json:
              schema:
                type: object

  /verify-release:
    post:
      summary: Verify a candidate artifact hash against admitted release state
      operationId: verifyRelease
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [binary_hash, entity_id]
              properties:
                binary_hash: { type: string }
                entity_id: { type: string, format: uuid }
                method:
                  type: string
                  default: sha256+admission
      responses:
        "200":
          description: Release verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  release_verification_id: { type: string, format: uuid }
                  status: { type: string }
                  details: { type: string, nullable: true }

  /issue-execution-capability:
    post:
      summary: Issue an execution capability for a previously admitted action
      operationId: issueExecutionCapability
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action_name, payload, scope_id, principal_entity_id, ttl_secs]
              properties:
                action_name: { type: string }
                payload: { type: string }
                scope_id: { type: string, format: uuid }
                principal_entity_id: { type: string, format: uuid }
                ttl_secs: { type: integer }
      responses:
        "200":
          description: Capability issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  capability_id: { type: string, format: uuid }
                  nonce: { type: string }
                  secret: { type: string }
                  expires_at: { type: string, format: date-time }

  /validate-execution-capability:
    post:
      summary: Validate an issued execution capability without redeeming it
      operationId: validateExecutionCapability
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [capability_id, nonce, secret, action_name, payload, scope_id, principal_entity_id]
              properties:
                capability_id: { type: string, format: uuid }
                nonce: { type: string }
                secret: { type: string }
                action_name: { type: string }
                payload: { type: string }
                scope_id: { type: string, format: uuid }
                principal_entity_id: { type: string, format: uuid }
      responses:
        "200":
          description: Capability is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid: { type: boolean }
                  capability_id: { type: string, format: uuid }
                  expires_at: { type: string, format: date-time }

  /revoke-execution-capability:
    post:
      summary: Revoke an issued execution capability
      operationId: revokeExecutionCapability
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [capability_id]
              properties:
                capability_id: { type: string, format: uuid }
                reason: { type: string }
      responses:
        "200":
          description: Capability lifecycle updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  capability_id: { type: string, format: uuid }
                  status: { type: string }
                  reason: { type: string, nullable: true }

  /redeem-execution-capability:
    post:
      summary: Redeem an execution capability and bind it to an outcome reference
      operationId: redeemExecutionCapability
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [capability_id, nonce, secret, action_name, payload, scope_id, principal_entity_id, outcome_ref]
              properties:
                capability_id: { type: string, format: uuid }
                nonce: { type: string }
                secret: { type: string }
                action_name: { type: string }
                payload: { type: string }
                scope_id: { type: string, format: uuid }
                principal_entity_id: { type: string, format: uuid }
                outcome_ref: { type: string }
      responses:
        "200":
          description: Capability redeemed
          content:
            application/json:
              schema:
                type: object
                properties:
                  capability_id: { type: string, format: uuid }
                  status: { type: string }
                  outcome_ref: { type: string }
