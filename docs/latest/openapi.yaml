                payload: { type: string }
                scope_id: { type: string, format: uuid }
                principal_entity_id: { type: string, format: uuid }
                event_type:
                  type: string
                  enum:
                    [
                      started,
                      progress,
                      suspended,
                      resumed,
                      cancelled,
                      failed,
                      timed_out,
                      intervention_acknowledged,
                      outcome_recorded,
                    ]
                reason: { type: string, nullable: true }
                progress_percent: { type: integer, minimum: 0, maximum: 100, nullable: true }
                progress_message: { type: string, nullable: true }
                outcome_ref: { type: string, nullable: true }
                intervention_id: { type: string, format: uuid, nullable: true }
