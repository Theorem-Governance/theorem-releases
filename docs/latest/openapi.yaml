      summary: Record a host execution lifecycle event for an issued execution capability
      operationId: recordExecutionCapabilityLifecycle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                [
                  capability_id,
                  nonce,
                  secret,
                  action_name,
                  payload,
                  scope_id,
                  principal_entity_id,
                  event_type,
                ]
              properties:
